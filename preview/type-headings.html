<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<title>Heading scale</title>
<style>
  body { margin: 0; padding: 24px 32px; background: #fff; }
  table { width: 100%; border-collapse: collapse; }
  td { padding: 8px 0; vertical-align: baseline; }
  td.meta { font-family: var(--font-mono); font-size: 11px; color: var(--fg-muted); width: 130px; padding-right: 16px; white-space: nowrap; }
  h1, h2, h3, h4 { margin: 0; }
</style>
</head>
<body>
  <table>
    <tr><td class="meta">h1 · 30 / 1.2 · 700</td><td><h1>대본을 만들고 있어요</h1></td></tr>
    <tr><td class="meta">h2 · 24 / 1.25 · 600</td><td><h2>생성 진행 상황</h2></td></tr>
    <tr><td class="meta">h3 · 20 / 1.3 · 600</td><td><h3>비주얼 방식 선택</h3></td></tr>
    <tr><td class="meta">h4 · 17 / 1.3 · 600</td><td><h4>이번 달 12편 남음</h4></td></tr>
  </table>
</body>
</html>

<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<title>Radii</title>
<style>
  body { margin: 0; padding: 22px 28px; background: #fff; }
  .row { display: grid; grid-template-columns: repeat(6, 1fr); gap: 14px; }
  .item { text-align: center; }
  .box { width: 78px; height: 78px; background: var(--accent-soft); border: 1px solid var(--accent-line); margin: 0 auto 8px; }
  .meta { font-family: var(--font-mono); font-size: 11px; color: var(--fg-muted); }
  .name { color: var(--fg); }
</style>
</head>
<body>
  <div class="row">
    <div class="item"><div class="box" style="border-radius:4px"></div><div class="meta"><span class="name">xs</span> · 4</div></div>
    <div class="item"><div class="box" style="border-radius:6px"></div><div class="meta"><span class="name">sm</span> · 6</div></div>
    <div class="item"><div class="box" style="border-radius:8px"></div><div class="meta"><span class="name">md</span> · 8</div></div>
    <div class="item"><div class="box" style="border-radius:12px"></div><div class="meta"><span class="name">lg</span> · 12</div></div>
    <div class="item"><div class="box" style="border-radius:16px"></div><div class="meta"><span class="name">xl</span> · 16</div></div>
    <div class="item"><div class="box" style="border-radius:9999px"></div><div class="meta"><span class="name">pill</span> · ∞</div></div>
  </div>
</body>
</html>

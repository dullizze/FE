<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<title>Segmented control</title>
<style>
  body { margin: 0; padding: 22px 28px; background: #fff; }
  .label { font-family: var(--font-mono); font-size: 11px; color: var(--fg-muted); margin-bottom: 8px; }
  .seg { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; padding: 4px; border: 1px solid var(--line); border-radius: 8px; background: var(--surface-soft); }
  .seg button { height: 36px; border: 0; border-radius: 6px; background: transparent; color: var(--fg-muted); cursor: pointer; font: 600 14px/1 var(--font-body); }
  .seg button[aria-pressed="true"] { background: #fff; color: var(--accent-hover); box-shadow: var(--shadow-sm); }
  .gap { height: 18px; }
  .stack { display: grid; gap: 14px; max-width: 480px; }
</style>
</head>
<body>
  <div class="stack">
    <div>
      <div class="label">"형" (template) picker — 3-option segmented</div>
      <div class="seg" role="group">
        <button aria-pressed="true">기본형</button>
        <button aria-pressed="false">팝형</button>
        <button aria-pressed="false">배너형</button>
      </div>
    </div>
    <div>
      <div class="label">2-option · plan tier</div>
      <div class="seg" style="grid-template-columns:repeat(2,1fr);">
        <button aria-pressed="false">Basic</button>
        <button aria-pressed="true">Pro</button>
      </div>
    </div>
  </div>
</body>
</html>

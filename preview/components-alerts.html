<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<title>Alert / error</title>
<style>
  body { margin: 0; padding: 22px 28px; background: #fff; display: grid; gap: 12px; }
  .alert { display: grid; grid-template-columns: 20px 1fr auto; gap: 12px; align-items: center; padding: 12px 14px; border-radius: 8px; border: 1px solid; font-size: 13px; line-height: 1.45; }
  .danger  { background: var(--danger-soft);  border-color: var(--danger-line);  color: var(--danger); }
  .warning { background: var(--warning-soft); border-color: var(--warning-line); color: var(--warning); }
  .info    { background: var(--accent-soft);  border-color: var(--accent-line); color: var(--accent-hover); }
  .alert b { font-weight: 700; }
  .glyph { font-weight: 900; font-size: 14px; line-height: 1; text-align: center; }
  button { height: 30px; padding: 0 12px; border-radius: 6px; border: 1px solid currentColor; background: transparent; color: inherit; font: 600 13px/1 var(--font-body); cursor: pointer; }
</style>
</head>
<body>
  <div class="alert danger"><span class="glyph">!</span><span><b>이미지 생성이 잠시 실패했어요.</b> 다시 시도해도 같은 문제가 반복되면 톤이나 주제를 살짝 바꿔보세요.</span><button>다시 시도</button></div>
  <div class="alert warning"><span class="glyph">⏳</span><span>생성에 1~2분 정도 걸려요. 다른 일 하셔도 괜찮아요. 완료되면 알려드릴게요.</span><button>알림 설정</button></div>
  <div class="alert info"><span class="glyph">i</span><span>비공개로 올라갔어요. 미리 보고 괜찮다 싶으면 <b>공개로 전환</b>해 주세요.</span><button>미리 보기</button></div>
</body>
</html>

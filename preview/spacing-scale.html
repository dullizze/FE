<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<title>Spacing</title>
<style>
  body { margin: 0; padding: 22px 28px; background: #fff; }
  .row { display: flex; flex-direction: column; gap: 8px; }
  .item { display: grid; grid-template-columns: 110px 1fr 90px; align-items: center; font-family: var(--font-mono); font-size: 11px; color: var(--fg-muted); }
  .name { color: var(--fg); }
  .bar { background: linear-gradient(135deg, var(--brand-grad-from), var(--brand-grad-to)); height: 12px; border-radius: 3px; }
  .val { text-align: right; }
</style>
</head>
<body>
  <div class="row">
    <div class="item"><span class="name">space-1</span> <div class="bar" style="width:4px"></div> <span class="val">4px</span></div>
    <div class="item"><span class="name">space-2</span> <div class="bar" style="width:8px"></div> <span class="val">8px</span></div>
    <div class="item"><span class="name">space-3</span> <div class="bar" style="width:12px"></div> <span class="val">12px</span></div>
    <div class="item"><span class="name">space-4</span> <div class="bar" style="width:16px"></div> <span class="val">16px</span></div>
    <div class="item"><span class="name">space-6</span> <div class="bar" style="width:24px"></div> <span class="val">24px</span></div>
    <div class="item"><span class="name">space-8</span> <div class="bar" style="width:32px"></div> <span class="val">32px</span></div>
    <div class="item"><span class="name">space-12</span> <div class="bar" style="width:48px"></div> <span class="val">48px</span></div>
    <div class="item"><span class="name">space-16</span> <div class="bar" style="width:64px"></div> <span class="val">64px</span></div>
  </div>
</body>
</html>

<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<title>Elevation</title>
<style>
  body { margin: 0; padding: 28px; background: #f6f7f9; }
  .row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 22px; }
  .item { text-align: center; }
  .box { width: 100px; height: 64px; background: #fff; border-radius: 8px; margin: 0 auto 12px; }
  .meta { font-family: var(--font-mono); font-size: 11px; color: var(--fg-muted); }
  .name { color: var(--fg); }
</style>
</head>
<body>
  <div class="row">
    <div class="item"><div class="box" style="box-shadow: 0 1px 2px rgba(16,24,40,0.06)"></div><div class="meta"><span class="name">xs</span> · cards on rest</div></div>
    <div class="item"><div class="box" style="box-shadow: 0 1px 2px rgba(16,24,40,0.08), 0 1px 3px rgba(16,24,40,0.04)"></div><div class="meta"><span class="name">sm</span> · selected segment</div></div>
    <div class="item"><div class="box" style="box-shadow: 0 4px 8px -2px rgba(16,24,40,0.08), 0 2px 4px -2px rgba(16,24,40,0.04)"></div><div class="meta"><span class="name">md</span> · popover</div></div>
    <div class="item"><div class="box" style="box-shadow: 0 12px 24px -8px rgba(16,24,40,0.12), 0 4px 8px -2px rgba(16,24,40,0.06)"></div><div class="meta"><span class="name">lg</span> · dialog</div></div>
  </div>
</body>
</html>

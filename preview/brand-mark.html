<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<title>Brand mark</title>
<style>
  body { margin: 0; padding: 28px; background: #fff; display: flex; align-items: center; gap: 32px; }
  .lockup { display: flex; align-items: center; gap: 14px; }
  .name { font-family: var(--font-display); font-weight: 700; font-size: 32px; letter-spacing: -0.02em; }
  .swatches { margin-left: auto; display: flex; gap: 8px; }
  .sw { width: 56px; height: 56px; border-radius: 10px; }
  .meta { font-size: 12px; color: var(--fg-muted); margin-top: 6px; text-align: center; font-family: var(--font-mono); }
  .col { display: flex; flex-direction: column; align-items: center; }
</style>
</head>
<body>
  <div class="lockup">
    <img src="../assets/dullizze-mark.svg" width="64" height="64" alt="" />
    <span class="name">Dullizze</span>
  </div>
  <div class="lockup">
    <div style="background:#0b111d;padding:14px 16px;border-radius:12px;display:flex;align-items:center;gap:12px;">
      <img src="../assets/dullizze-mark.svg" width="40" height="40" alt="" />
      <span class="name" style="color:#fff;font-size:24px;">Dullizze</span>
    </div>
  </div>
  <div class="swatches">
    <div class="col"><div class="sw" style="background:linear-gradient(135deg,var(--brand-grad-from),var(--brand-grad-to));"></div><div class="meta">brand</div></div>
    <div class="col"><div class="sw" style="background:var(--w-blue-50);"></div><div class="meta">#0066FF</div></div>
    <div class="col"><div class="sw" style="background:var(--w-violet-50);"></div><div class="meta">#6541F2</div></div>
  </div>
</body>
</html>

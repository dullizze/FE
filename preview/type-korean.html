<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<title>Korean specimen</title>
<style>
  body { margin: 0; padding: 24px 32px; background: #fff; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
  .card { padding: 14px 16px; border: 1px solid var(--line); border-radius: var(--radius-md); }
  .meta { font-family: var(--font-mono); font-size: 11px; color: var(--fg-muted); margin-bottom: 6px; }
  .specimen { font-size: 17px; line-height: 1.55; }
  .specimen.alt { font-family: var(--font-display); }
  .latin { font-family: var(--font-mono); font-size: 12px; color: var(--fg-muted); margin-top: 4px; }
</style>
</head>
<body>
  <div class="grid">
    <div class="card">
      <div class="meta">body · Pretendard</div>
      <div class="specimen">대본 쓰는 중… 목소리 입히는 중…</div>
      <div class="latin">The quick brown fox 0123456789</div>
    </div>
    <div class="card">
      <div class="meta">display · Wanted Sans</div>
      <div class="specimen alt" style="font-weight:700;">주제 한 줄, 쇼츠 한 편.</div>
      <div class="latin">The quick brown fox 0123456789</div>
    </div>
  </div>
</body>
</html>

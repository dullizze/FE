<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<title>Display type</title>
<style>
  body { margin: 0; padding: 28px 32px; background: #fff; }
  .row { display: flex; align-items: baseline; gap: 18px; }
  .meta { font-family: var(--font-mono); font-size: 11px; color: var(--fg-muted); white-space: nowrap; }
  h1.disp { font-family: var(--font-display); font-weight: 700; font-size: 56px; line-height: 1.05; letter-spacing: -0.022em; margin: 0; }
  .sub { color: var(--fg-muted); font-size: 14px; margin-top: 6px; }
</style>
</head>
<body>
  <div class="row">
    <h1 class="disp">주제 한 줄,<br/>쇼츠 한 편.</h1>
  </div>
  <div class="sub">Wanted Sans · 700 · 56 / 1.05 · -0.022em</div>
</body>
</html>

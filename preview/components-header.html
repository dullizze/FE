<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<title>Header & quota</title>
<style>
  body { margin: 0; background: var(--bg); padding: 22px; }
  header { display: flex; align-items: center; justify-content: space-between; gap: 18px; padding: 0 20px; height: 58px; background: #fff; border: 1px solid var(--line); border-radius: 10px; }
  .brand { display: flex; align-items: center; gap: 10px; }
  .brand img { width: 26px; height: 26px; }
  .brand .name { font: 700 17px/1.2 var(--font-display); letter-spacing: -0.01em; }
  nav { display: flex; gap: 22px; font-size: 14px; color: var(--fg-muted); font-weight: 500; }
  nav a { color: inherit; }
  nav a.active { color: var(--fg); font-weight: 600; }
  .right { display: flex; align-items: center; gap: 12px; }
  .status { display: inline-flex; align-items: center; gap: 6px; color: var(--fg-muted); font-size: 12px; font-family: var(--font-mono); }
  .status .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--success); }
  .quota { display: inline-flex; align-items: center; gap: 6px; height: 28px; padding: 0 12px; border-radius: 9999px; background: var(--accent-soft); color: var(--accent-hover); font-size: 12px; font-weight: 700; }
  .avatar { width: 28px; height: 28px; border-radius: 50%; background: linear-gradient(135deg, #ffd5e8, #c4d9ff); display: grid; place-items: center; font-size: 11px; font-weight: 700; color: #115e59; }
</style>
</head>
<body>
  <header>
    <div class="brand"><img src="../assets/dullizze-mark.svg" alt=""/><span class="name">Dullizze</span></div>
    <nav><a class="active">만들기</a><a>대시보드</a><a>프리셋</a><a>설정</a></nav>
    <div class="right">
      <span class="status"><span class="dot"></span>API · 정상</span>
      <span class="quota">이번 달 12편 남음</span>
      <span class="avatar">소</span>
    </div>
  </header>
</body>
</html>

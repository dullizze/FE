<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<title>Neutral scale</title>
<style>
  body { margin: 0; padding: 22px 28px; background: #fff; }
  .row { display: grid; grid-template-columns: repeat(10, 1fr); gap: 6px; }
  .sw { border-radius: var(--radius-sm); overflow: hidden; border: 1px solid var(--line); }
  .chip { height: 64px; }
  .info { padding: 6px 4px; font-size: 10px; font-family: var(--font-mono); color: var(--fg-muted); text-align: center; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:#f6f7f9"></div><div class="info">50</div></div>
    <div class="sw"><div class="chip" style="background:#f1f5f3"></div><div class="info">100</div></div>
    <div class="sw"><div class="chip" style="background:#e6ebe9"></div><div class="info">200</div></div>
    <div class="sw"><div class="chip" style="background:#d9e0de"></div><div class="info">300</div></div>
    <div class="sw"><div class="chip" style="background:#b4bcbb"></div><div class="info">400</div></div>
    <div class="sw"><div class="chip" style="background:#8a9492"></div><div class="info">500</div></div>
    <div class="sw"><div class="chip" style="background:#647078"></div><div class="info" style="color:#fff;background:#647078;border-top:1px solid #647078;">600</div></div>
    <div class="sw"><div class="chip" style="background:#44505a"></div><div class="info" style="color:#fff;background:#44505a;">700</div></div>
    <div class="sw"><div class="chip" style="background:#2a343d"></div><div class="info" style="color:#fff;background:#2a343d;">800</div></div>
    <div class="sw"><div class="chip" style="background:#1e2428"></div><div class="info" style="color:#fff;background:#1e2428;">900</div></div>
  </div>
</body>
</html>
